    .auth-name { font-size: 12px; color: #555; }

    .btn { cursor: pointer; }
    .btn-link {
      font-size: 13px; color: #555; background: none; border: none;

    }
    .btn-link:hover { background: #f0f0f0; color: #111; }

      font-size: 22px; font-weight: 700; line-height: 1.3;
      margin-bottom: 4px;
    }
    .page-title a { color: inherit; text-decoration: none; }
    .page-title a:hover { text-decoration: underline; }
    .page-subtitle {
      font-size: 13px; color: #777; margin-bottom: 20px;
    }
    .page-rule {
      border: none; border-top: 1px solid #e0e0e0; margin-bottom: 28px;
    }

    /* ── Section header ───────────────────────────────────────────────────── */
    .section-heading {
      font-size: 15px; font-weight: 700; margin: 28px 0 0;
    }

    /* ── Table ────────────────────────────────────────────────────────────── */

      width: 100%; border-collapse: collapse; margin-top: 8px;
    }
    .news-table th {
      font-size: 13px; font-weight: 600; text-align: left;
      padding: 7px 12px 7px 0; border-bottom: 1px solid #111;
      color: #111;
    }
    .news-table th:last-child { padding-right: 0; }
    .news-table td {
      padding: 10px 12px 10px 0; vertical-align: top;
      border-bottom: 1px solid #e8e8e8; font-size: 13px;
    }
    .news-table td:last-child { padding-right: 0; }
    .news-table tr.is-read td { opacity: 0.45; }
    .news-table tr:hover td { background: #fafafa; }

    /* columns */
    .col-check { width: 20px; padding-right: 6px !important; }
    .col-source { width: 130px; font-weight: 600; }
    .col-post   { }
    .col-date   { width: 56px; white-space: nowrap; color: #555; }
    .col-platform { width: 80px; color: #555; }

    .post-title a {
      color: #0066cc; text-decoration: underline;
    }
    .post-title a:visited { color: #551a8b; }
    .post-desc {
      color: #555; margin-top: 2px; font-size: 12px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* read checkbox */
    .read-check {
      width: 14px; height: 14px; border-radius: 3px;
      border: 1.5px solid #ccc; background: #fff;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; color: transparent; flex-shrink: 0; transition: all 0.1s;
      vertical-align: middle;
    }
    .read-check:hover { border-color: #888; }
    .read-check.is-read { background: #111; border-color: #111; color: #fff; }

    /* ── Discovery row ────────────────────────────────────────────────────── */
    .discover-row {
      margin-top: 28px; padding: 14px 0;
      border-top: 1px solid #e8e8e8; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    }
    .discover-label {
      font-size: 12px; font-weight: 600; color: #777; white-space: nowrap;
    }
    .discover-person a { color: #111; font-weight: 600; text-decoration: none; }
    .discover-person a:hover { text-decoration: underline; }
    .discover-why { font-size: 13px; color: #555; }
    .btn-roster {
      font-size: 12px; padding: 2px 8px; border-radius: 4px;
      border: 1px solid #ccc; background: #fff; color: #333;
      cursor: pointer; transition: all 0.1s; white-space: nowrap;
    }
    .btn-roster:hover:not(:disabled) { background: #f0f0f0; }
    .btn-roster:disabled { opacity: 0.5; cursor: default; }

    /* ── Modals ───────────────────────────────────────────────────────────── */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(2px);
    }
    .modal-back.hidden { display: none; }
    .modal {
      background: #fff; border-radius: 10px; padding: 26px 28px; width: 360px;

    .modal-sub { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
    .modal-input {
      width: 100%; padding: 8px 10px; border: 1px solid #d0d0d0;
      border-radius: 6px; font-size: 14px; outline: none; font-family: inherit;
    }
    .modal-input:focus { border-color: #111; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
    .modal-status { font-size: 12px; color: #666; margin-top: 8px; min-height: 16px; }
    .modal-divider { text-align: center; font-size: 11px; color: #aaa; margin: 12px 0; }

      font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 5px;

    .btn-outline:hover { background: #f5f5f5; }
    .btn-solid {
      font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 5px;

const PLATFORM_COLORS = {
  'LinkedIn':   '#0A66C2',
  'Twitter':    '#000000',
  'Substack':   '#FF6719',
  'Newsletter': '#8B5CF6',
  'Blog':       '#6B7280',
  'YouTube':    '#EF4444',
};

/* ── State ────────────────────────────────────────────────────────────────── */
let sb = null;               // Supabase client (null if not configured)
let currentUser = null;
let selectedDay = 0;         // index into HISTORY (0 = today)
let readSet = new Set();     // URLs the user has marked read
let rosterSet = new Set();   // URLs in the user's news roster

/* ── Supabase init ────────────────────────────────────────────────────────── */
function initSupabase() {
  if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return;
  sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  sb.auth.onAuthStateChange(async (_event, session) => {
    currentUser = session?.user || null;
    renderAuthZone();
    if (currentUser) await syncFromSupabase();
    renderDayNav();
    renderDay(getDay(selectedDay));
  });
}

/* ── localStorage helpers ─────────────────────────────────────────────────── */
function lsGet(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; }
}
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function loadLocalState() {
  readSet   = new Set(lsGet('dpn:read')   || []);
  rosterSet = new Set(lsGet('dpn:roster') || []);
}

function saveLocalRead()   { lsSet('dpn:read',   [...readSet]);   }
function saveLocalRoster() { lsSet('dpn:roster', [...rosterSet]); }

/* ── Supabase sync ────────────────────────────────────────────────────────── */
async function syncFromSupabase() {
  if (!sb || !currentUser) return;
  const [reads, roster] = await Promise.all([
    sb.from('read_items').select('url').eq('user_id', currentUser.id),
    sb.from('news_roster').select('url').eq('user_id', currentUser.id),
  ]);
  (reads.data || []).forEach(r => readSet.add(r.url));
  (roster.data || []).forEach(r => rosterSet.add(r.url));
  saveLocalRead();
  saveLocalRoster();
}

/* ── Read tracking ────────────────────────────────────────────────────────── */
async function toggleRead(url) {
  const nowRead = !readSet.has(url);
  nowRead ? readSet.add(url) : readSet.delete(url);
  saveLocalRead();
  // Update checkbox + row in DOM
  const chk = document.querySelector(`.read-check[data-url="${CSS.escape(url)}"]`);
  if (chk) chk.classList.toggle('is-read', nowRead);
  const row = chk?.closest('tr');
  if (row) row.classList.toggle('is-read', nowRead);
  renderDayNav();
  if (sb && currentUser) {
    if (nowRead) {
      await sb.from('read_items').upsert({ user_id: currentUser.id, url, read_at: new Date().toISOString() });
    } else {
      await sb.from('read_items').delete().eq('user_id', currentUser.id).eq('url', url);
    }
  }
}

/* ── News roster ──────────────────────────────────────────────────────────── */
async function addToRoster(pick) {
  if (!currentUser && sb) { openModal('modal-auth'); return; }
  if (rosterSet.has(pick.url)) return;
  rosterSet.add(pick.url);
  saveLocalRoster();
  const btn = document.getElementById('btn-roster');
  if (btn) { btn.textContent = '✓ Saved to my roster'; btn.disabled = true; }
  if (sb && currentUser) {
    await sb.from('news_roster').upsert({
      user_id: currentUser.id, person: pick.person, role: pick.role,
      platform: pick.platform, color: pick.color, url: pick.url,
    });
  }
}

/* ── Auth ─────────────────────────────────────────────────────────────────── */
function requireSupabase() {
  if (!sb) {
    setStatus('auth-status', 'Configure Supabase keys to enable sign-in.');
    return false;
  }
  return true;
}
async function signInGoogle() {
  if (!requireSupabase()) return;
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.origin } });
}
async function signInGitHub() {
  if (!requireSupabase()) return;
  await sb.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: location.origin } });
}
async function sendMagicLink() {
  if (!requireSupabase()) return;
  const email = document.getElementById('auth-email').value.trim();
  if (!email) return;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin } });
  setStatus('auth-status', error ? error.message : '✓ Check your email for the magic link.');
}
async function signOut() {
  if (sb) await sb.auth.signOut();
  currentUser = null;
  renderAuthZone();
}
function renderAuthZone() {
  const zone = document.getElementById('auth-zone');
  if (!zone) return;
  if (currentUser) {
    const name = currentUser.user_metadata?.full_name || currentUser.email || '';
    const avatar = currentUser.user_metadata?.avatar_url;
    const initials = name[0]?.toUpperCase() || '?';
    zone.innerHTML = `
      <div class="auth-avatar">${avatar ? `<img src="${avatar}" alt="">` : initials}</div>
      <span class="auth-name">${name}</span>
      <button class="btn btn-outline" onclick="signOut()">Sign out</button>`;
  } else {
    zone.innerHTML = `
      <button class="btn btn-outline" onclick="openModal('modal-sub')">Subscribe</button>
      <button class="btn btn-solid" onclick="openModal('modal-auth')">Sign in</button>`;
  }
}

/* ── Subscribe ────────────────────────────────────────────────────────────── */
async function submitSubscribe() {
  const email = document.getElementById('sub-email').value.trim();
  if (!email) return;
  if (sb) {
    const { error } = await sb.from('subscribers').upsert({ email });
    setStatus('sub-status', error ? 'Something went wrong — try again.' : '✓ Subscribed! Daily reads coming your way.');
  } else {
    setStatus('sub-status', '✓ Thank you! Newsletter launches soon.');
  }
}

/* ── Modals ───────────────────────────────────────────────────────────────── */
function openModal(id)  { document.getElementById(id)?.classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id)?.classList.add('hidden'); }
function closeOnBack(e, id) { if (e.target === e.currentTarget) closeModal(id); }
function setStatus(id, msg) { const el = document.getElementById(id); if (el) el.textContent = msg; }

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function getDay(index) {
  if (HISTORY.length) return HISTORY[index] || HISTORY[0];
  return NEWS_DATA;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date((iso + '').replace(/-/g, '/') + ' 12:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtDayLabel(dayData, index) {
  if (index === 0) return 'Today';
  if (index === 1) return 'Yesterday';
  const d = new Date((dayData.date || '').replace(/-/g, '/') + ' 12:00');
  if (isNaN(d)) return dayData.date || '—';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/* ── Day nav ──────────────────────────────────────────────────────────────── */
function renderDayNav() {
  const nav = document.getElementById('day-nav');
  if (!nav) return;
  const days = HISTORY.length ? HISTORY : [NEWS_DATA];
  nav.innerHTML = days.map((day, i) =>
    `<button class="day-btn ${i === selectedDay ? 'active' : ''}" onclick="selectDay(${i})">${fmtDayLabel(day, i)}</button>`
    + (i < days.length - 1 ? '<span class="day-sep">/</span>' : '')
  ).join('');
}

/* ── Render ───────────────────────────────────────────────────────────────── */
function selectDay(index) {
  selectedDay = index;
  renderDayNav();
  renderDay(getDay(index));
}

function renderDay(dayData) {
  if (!dayData) return;

  const d = dayData.date ? new Date((dayData.date + '').replace(/-/g, '/') + ' 12:00') : null;
  const dayStr = d && !isNaN(d)
    ? d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })
    : '';
  document.getElementById('page-title').textContent =
    'Daily Product & AI News' + (dayStr ? ' \u2014 ' + dayStr : '');

  if (dayData.generated) {
    const g = new Date(dayData.generated);
    if (!isNaN(g))
      document.getElementById('header-meta').textContent =
        'Updated ' + g.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  const items = dayData.items || [];
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
  const recent = items.filter(n => !n.published || new Date((n.published+'').replace(/-/g,'/') + ' 12:00') >= cutoff);
  const older  = items.filter(n => n.published  && new Date((n.published+'').replace(/-/g,'/') + ' 12:00') < cutoff);

  let html = '';

  if (recent.length) {
    const dates = recent.map(n => n.published).filter(Boolean).sort();
    const range = dates.length > 1
      ? fmtDate(dates[0]) + '\u2013' + fmtDate(dates[dates.length - 1])
      : fmtDate(dates[0] || '');
    html += `<h2 class="section-heading">Recent Posts${range ? ' (' + range + ')' : ''}</h2>`;
    html += buildTable(recent);
  }

  if (older.length) {
    const dates = older.map(n => n.published).filter(Boolean).sort();
    const range = dates.length > 1
      ? fmtDate(dates[0]) + '\u2013' + fmtDate(dates[dates.length - 1])
      : fmtDate(dates[0] || '');
    html += `<h2 class="section-heading" style="margin-top:32px">Older but Notable${range ? ' (' + range + ')' : ''}</h2>`;
    html += buildTable(older);
  }

  if (!items.length) html = '<p style="color:#777;margin-top:20px;font-size:13px">No posts for this day.</p>';

  if (dayData.daily_pick) html += buildDiscoverRow(dayData.daily_pick);

  document.getElementById('content').innerHTML = html;
}

function buildTable(items) {
  const rows = items.map(n => {
    const isRead = n.url ? readSet.has(n.url) : false;
    const urlSafe = (n.url || '').replace(/"/g, '&quot;');
    const urlJs   = (n.url || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const checkEl = n.url
      ? `<span class="read-check ${isRead ? 'is-read' : ''}" data-url="${urlSafe}"
           onclick="toggleRead('${urlJs}')" title="${isRead ? 'Mark unread' : 'Mark read'}">&#10003;</span>`
      : '';
    const titleEl = n.url
      ? `<a href="${urlSafe}" target="_blank">${n.title || n.person}</a>`
      : (n.title || n.person || '');
    const desc = n.description
      ? `<div class="post-desc">${n.description}</div>`
      : '';
    return `<tr class="${isRead ? 'is-read' : ''}">
      <td class="col-check">${checkEl}</td>
      <td class="col-source">${n.person}</td>
      <td class="col-post"><div class="post-title">${titleEl}</div>${desc}</td>
      <td class="col-date">${fmtDate(n.published)}</td>
      <td class="col-platform">${n.platform || ''}</td>
    </tr>`;
  }).join('');
  return `<table class="news-table">
    <thead><tr>
      <th class="col-check"></th>
      <th class="col-source">Source</th>
      <th class="col-post">Post</th>
      <th class="col-date">Date</th>
      <th class="col-platform">Platform</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function buildDiscoverRow(pick) {
  const inRoster = rosterSet.has(pick.url);
  const pickJson = JSON.stringify(pick).replace(/</g, '\\u003c');
  return `<div class="discover-row">
    <span class="discover-label">&#10022; Start following:</span>
    <span class="discover-person"><a href="${pick.url}" target="_blank">${pick.person}</a></span>
    <span class="discover-why">&mdash; ${pick.why}</span>
    <button class="btn-roster" id="btn-roster"
      onclick='addToRoster(${pickJson})'
      ${inRoster ? 'disabled' : ''}>
      ${inRoster ? '&#10003; In my roster' : '+ Add to my roster'}
    </button>
  </div>`;
}

/* ── Init ─────────────────────────────────────────────────────────────────── */
async function init() {
  loadLocalState();
  initSupabase();
  if (sb) {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session?.user || null;
    if (currentUser) await syncFromSupabase();
  }
  renderAuthZone();
  renderDayNav();
  renderDay(getDay(0));
}

init();
</script>
